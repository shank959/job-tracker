name: daily-quant-job-scan
on:
  schedule:
    - cron: "0 15 * * *"   # 15:00 UTC = 08:00 America/Los_Angeles (07:00 during PST)
  workflow_dispatch: {}

permissions:
  contents: write            # commit updated SQLite DB back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Daily run
        env:
          PYTHONPATH: src
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          ALERT_PHONE_TO: ${{ secrets.ALERT_PHONE_TO }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m jobtracker.cli run
      - name: Commit DB + exports
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/tracker.db data/backups exports || true
          git diff --cached --quiet || git commit -m "daily scan $(date -u +%F)"
          git push
